include '/var/lib/postgresql/data/pgdata/postgresql.conf'

# Runtime tuning for blade (128 GiB RAM, mixed HDD ZFS workload).
# This file is included from docker/stausee/docker-compose.yml via:
#   postgres -c config_file=/etc/postgresql/runtime-tuning.conf
#
# Keep this profile durable-safe. Bulk-load-only unsafe toggles (fsync=off, full_page_writes=off)
# are intentionally excluded.

# Memory
shared_buffers = '24GB'
effective_cache_size = '72GB'
work_mem = '64MB'
maintenance_work_mem = '2GB'
temp_buffers = '64MB'

# WAL / checkpoints
wal_compression = on
max_wal_size = '16GB'
min_wal_size = '2GB'
checkpoint_timeout = '30min'
checkpoint_completion_target = 0.9

# Planner / execution
random_page_cost = 1.5
effective_io_concurrency = 200
jit = off

# Parallelism (matches blade CPU topology without overcommitting)
max_worker_processes = 16
max_parallel_workers = 12
max_parallel_workers_per_gather = 4
max_parallel_maintenance_workers = 4
