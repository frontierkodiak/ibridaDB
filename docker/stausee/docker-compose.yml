services:
  ibrida:
    image: frontierkodiak/ibridadb:latest
    user: "998:998"
    shm_size: '16g'
    environment:
      POSTGRES_PASSWORD: ${IBRIDADB_POSTGRES_PASSWORD:?set via with-polli-secrets or env}
      PGDATA: /var/lib/postgresql/data/pgdata
    command:
      - postgres
      - -c
      - config_file=/etc/postgresql/runtime-tuning.conf
    volumes:
      - ~/repo/ibridaDB/dbTools:/tool
      - ~/repo/ibridaDB/dbQueries:/query
      - ./postgresql.runtime-tuning.conf:/etc/postgresql/runtime-tuning.conf:ro
      - /database/ibridaDB:/var/lib/postgresql/data
      - /peach/ibridaDB/pgtemp:/pgtemp
      - /datasets/ibrida-data/exports:/exports
      - /datasets/ibrida-data/intake:/metadata
      - /datasets/dem:/dem
    ports:
      - "5432:5432"
    container_name: ibridaDB
